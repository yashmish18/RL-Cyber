<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberGuard SOC Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@300;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0b10;
            --surface-color: rgba(20, 22, 30, 0.8);
            --accent-cyan: #00f2ff;
            --accent-green: #00ff9d;
            --accent-red: #ff3e3e;
            --text-color: #e0e0e0;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Roboto Mono', monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(10, 11, 16, 0.9);
            z-index: 100;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin: 0;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        main {
            display: grid;
            grid-template-columns: 350px 1fr 400px;
            gap: 1rem;
            padding: 1rem;
            flex: 1;
            overflow: hidden;
        }

        .panel {
            background: var(--surface-color);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .log-entry {
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .ts {
            color: #888;
        }

        .info {
            color: var(--accent-cyan);
        }

        .warn {
            color: #ffca28;
        }

        .error {
            color: var(--accent-red);
        }

        .approval-card {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid var(--accent-cyan);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            position: relative;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(0, 242, 255, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(0, 242, 255, 0);
            }
        }

        .btn-group {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        button {
            flex: 1;
            padding: 0.6rem;
            border: 1px solid var(--accent-cyan);
            background: transparent;
            color: var(--accent-cyan);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--accent-cyan);
            color: var(--bg-color);
        }

        button.reject {
            border-color: var(--accent-red);
            color: var(--accent-red);
        }

        button.reject:hover {
            background: var(--accent-red);
            color: white;
        }

        .empty-state {
            text-align: center;
            color: #666;
            margin-top: 2rem;
            font-style: italic;
        }

        .network-map {
            position: relative;
            height: 100%;
            background: radial-gradient(circle at center, #1a1c25 0%, #0a0b10 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .host {
            width: 80px;
            height: 80px;
            border: 1px solid var(--accent-cyan);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 242, 255, 0.05);
            position: absolute;
            font-size: 0.6rem;
            text-align: center;
        }

        .host.compromised {
            border-color: var(--accent-red);
            background: rgba(255, 62, 62, 0.1);
            color: var(--accent-red);
        }

        .host.isolated {
            border-style: dashed;
            opacity: 0.5;
        }

        .status-badge {
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .status-ok {
            background: rgba(0, 255, 157, 0.1);
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }

        .status-alert {
            background: rgba(255, 62, 62, 0.1);
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
        }
    </style>
</head>

<body>
    <header>
        <h1>CyberGuard SOC v1.0</h1>
        <div id="connection-status" class="status-badge status-ok">System Online</div>
    </header>

    <main>
        <section class="panel">
            <div class="panel-header">Realtime Telemetry</div>
            <div class="panel-content" id="log-list">
                <div class="log-entry"><span class="ts">[16:15:02]</span> <span class="info">SYSTEM: Monitoring Splunk
                        connector...</span></div>
                <div class="log-entry"><span class="ts">[16:15:10]</span> <span class="info">NETWORK: Inbound traffic
                        normal on DMZ-01.</span></div>
            </div>
        </section>

        <section class="panel">
            <div class="panel-header">Threat Map</div>
            <div class="panel-content network-map">
                <div class="host" style="top: 20%; left: 50%;">WEB-01<br><span style="font-size:0.5rem">10.0.0.10</span>
                </div>
                <div class="host" style="top: 50%; left: 30%;">APP-01<br><span style="font-size:0.5rem">10.0.0.11</span>
                </div>
                <div class="host compromised" style="top: 50%; left: 70%;">DB-01<br><span
                        style="font-size:0.5rem">10.0.0.20</span></div>
                <div class="host" style="top: 80%; left: 50%;">ADMIN-01<br><span
                        style="font-size:0.5rem">10.0.0.5</span></div>
            </div>
        </section>

        <section class="panel">
            <div class="panel-header">Action Approval Queue</div>
            <div class="panel-content" id="approval-queue">
                <div class="empty-state">No pending actions.</div>
            </div>
        </section>
    </main>

    <script>
        let currentTaskId = 'easy';

        async function fetchState() {
            try {
                // In a proper openenv setup, we'd fetch from /api/observation/latest
                // For this demo, we'll fetch pending approvals which contains the latest observation
                const response = await fetch('/api/approval/pending');
                const data = await response.json();

                if (data.pending && data.pending.length > 0) {
                    const latest = data.pending[data.pending.length - 1];
                    updateNetworkMap(latest.observation);
                    updateLogs(latest.observation);
                    renderApprovals(data.pending);
                }
            } catch (error) {
                console.error('Error fetching state:', error);
            }
        }

        function updateNetworkMap(obs) {
            const map = document.querySelector('.network-map');
            const hosts = Object.keys(obs.host_compromise);

            // Clear existing if host count changed (simple diffing)
            if (map.children.length !== hosts.length) {
                map.innerHTML = '';
                hosts.forEach((h, i) => {
                    const angle = (i / hosts.length) * 2 * Math.PI;
                    const r = 150; // radius
                    const x = 50 + (r * Math.cos(angle)) / 5; // scaled for %
                    const y = 50 + (r * Math.sin(angle)) / 5;

                    const el = document.createElement('div');
                    el.className = 'host';
                    el.id = `host-${h}`;
                    el.style.left = `${x}%`;
                    el.style.top = `${y}%`;
                    el.innerHTML = `${h.toUpperCase()}<br><span class="ip-label"></span>`;
                    map.appendChild(el);
                });
            }

            hosts.forEach(h => {
                const el = document.getElementById(`host-${h}`);
                if (!el) return;

                if (obs.host_compromise[h]) el.classList.add('compromised');
                else el.classList.remove('compromised');

                if (obs.host_isolation[h]) el.classList.add('isolated');
                else el.classList.remove('isolated');
            });
        }

        function updateLogs(obs) {
            const list = document.getElementById('log-list');
            if (!obs.ids_alerts) return;

            // Only add new alerts
            obs.ids_alerts.forEach(alert => {
                if (Array.from(list.children).some(c => c.innerText.includes(alert))) return;

                const entry = document.createElement('div');
                entry.className = 'log-entry';
                const time = new Date().toLocaleTimeString();
                entry.innerHTML = `<span class="ts">[${time}]</span> <span class="warn">IDS: ${alert}</span>`;
                list.prepend(entry);
                if (list.children.length > 20) list.lastChild.remove();
            });
        }

        function renderApprovals(pending) {
            const container = document.getElementById('approval-queue');
            const active = pending.filter(p => p.status === 'pending');

            if (active.length === 0) {
                container.innerHTML = '<div class="empty-state">No pending actions.</div>';
                return;
            }

            container.innerHTML = '';
            active.forEach(p => {
                const card = document.createElement('div');
                card.className = 'approval-card';

                // Highlight if it's an AI suggestion
                const isAi = p.metadata && p.metadata.is_ai_suggestion;

                card.innerHTML = `
                    <div style="font-weight:bold; color:var(--accent-cyan); margin-bottom:0.5rem">
                        PROPOSAL: ${p.proposed_action.action_type.toUpperCase()} 
                        ${isAi ? '<span style="color:var(--accent-green); font-size:0.6rem">[AI FAVORITE]</span>' : ''}
                    </div>
                    <div style="font-size:0.7rem; margin-bottom:0.3rem">TARGET: ${p.proposed_action.target_host}</div>
                    <div style="font-size:0.7rem; margin-bottom:0.5rem">CONFIDENCE: ${(p.confidence * 100 || 85).toFixed(1)}%</div>
                    <div class="btn-group">
                        <button onclick="decide('${p.action_id}', 'approve')">Execute</button>
                        <button class="reject" onclick="decide('${p.action_id}', 'reject')">Deny</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function decide(actionId, decision) {
            try {
                await fetch('/api/approval/decide', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action_id: actionId, decision: decision })
                });
                fetchState();
            } catch (error) {
                console.error('Error recording decision:', error);
            }
        }

        setInterval(fetchState, 1500);
        fetchState();
    </script>
</body>

</html>
